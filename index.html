<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>ORO Cafe</title>
    <meta property="og:title" content="ORO Cafe">
    <meta property="og:description" content="أهلاً بكم في أورو كافيه - استمتعوا بأجواء رائعة ومنيو مميز">
    <meta property="og:image" content="التصميم.png">
    <meta property="og:type" content="website">

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #000;
        }
        .bg-image {
            background-image: url('التصميم.png');
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
            position: relative;
        }
        .buttons-container {
            position: absolute;
            top: 65%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 380px;
            height: 220px; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .invisible-btn {
            display: block;
            width: 100%;
            height: 100px; 
            background: rgba(255, 255, 255, 0); 
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

<div class="bg-image">
    <div class="buttons-container">
        <a href="Https://maps.app.goo.gl/rgYPHEZzcAo8UNZc6" class="invisible-btn" target="_blank"></a>
        
        <a href="ORO COFFEE (2).pdf" class="invisible-btn" target="_blank"></a>
    </div>
</div>

</body>
</html>
