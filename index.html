<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oro Cafe | أورو كافيه</title>
    
    <meta property="og:title" content="Oro Cafe | أورو كافيه">
    <meta property="og:description" content="أهلاً بكم في أورو كافيه - منيو المشروبات واللوكيشن">
    <meta property="og:image" content="https://raw.githubusercontent.com/Oro-Cafe/ORO-Caf-/main/%D8%A7%D9%84%D8%BA%D9%84%D8%A7%D9%81.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:type" content="website">

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #000;
        }
        .bg-image {
            /* الخلفية الأصلية هتفضل زي ما هي */
            background-image: url('التصميم.png');
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
            position: relative;
        }
        .buttons-container {
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 380px;
            height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .invisible-btn {
            display: block;
            width: 100%;
            height: 48%;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="bg-image">
        <div class="buttons-container">
            <a href="https://wa.me/message/YOUR_LINK" class="invisible-btn"></a>
            <a href="https://maps.app.goo.gl/YOUR_LOCATION" class="invisible-btn"></a>
        </div>
    </div>
</body>
</html>
