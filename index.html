<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oro Cafe</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #000;
        }
        .bg-image {
            background-image: url('التصميم.png');
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
            position: relative;
        }
        .buttons-container {
            position: absolute;
            top: 65%; /* مكان الزراير */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 380px;
            height: 220px; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .invisible-btn {
            display: block;
            width: 100%;
            height: 95px; /* كبّرنا مساحة الضغط */
            background: rgba(255, 255, 255, 0); 
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="bg-image">
    <div class="buttons-container">
        <a href="https://www.google.com/maps?q=Oro+Cafe+Damietta" class="invisible-btn" target="_blank"></a>
        
        <a href="ORO COFFEE (2).pdf" class="invisible-btn" target="_blank"></a>
    </div>
</div>

</body>
</html>
